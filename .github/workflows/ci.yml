name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.15.19

      - name: Ruff lint
        run: ruff check src tests evals

      - name: Ruff format
        run: ruff format --check src tests evals

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify version
        run: python -c "import sys; sys.path.insert(0, 'src'); from version import get_version; v = get_version(); assert v, v; print(v)"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile check
        run: python -m compileall -q src

  web-e2e:
    runs-on: ubuntu-latest
    env:
      E2E_CI_TIER: ${{ github.event_name == 'pull_request' && 'pr' || 'full' }}
      E2E_WEB_MODE: start
      E2E_SKIP_BUILD: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Web unit checks
        working-directory: web
        run: npm run test:unit

      - name: Build
        working-directory: web
        run: npm run build:e2e
        env:
          E2E_API_URL: http://127.0.0.1:8000

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run E2E (${{ env.E2E_CI_TIER }} tier)
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t roast-api:ci .

      - name: Build web image
        run: docker build -t roast-web:ci ./web

name: E2E Real LLM

on:
  workflow_dispatch:
  schedule:
    # 04:00 UTC Mondays — integration signal only, not a PR gate
    - cron: "0 4 * * 1"

jobs:
  real-llm:
    runs-on: ubuntu-latest
    env:
      E2E_REAL_LLM: "true"
      E2E_WEB_MODE: start
      E2E_SKIP_BUILD: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build:e2e
        env:
          E2E_API_URL: http://127.0.0.1:8000

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Require model runtime prerequisites
        working-directory: web
        run: node e2e/require-real-llm-prereqs.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Run real LLM E2E
        working-directory: web
        run: npm run test:e2e:real-llm
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-real-llm-${{ github.run_id }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14
